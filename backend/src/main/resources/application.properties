spring.application.name=url-shortener

# datasource configuration
spring.datasource.name=url
spring.datasource.url=jdbc:mysql://localhost:3306/url
spring.datasource.username=root
spring.datasource.password=$Deskt0p$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# redis configuration

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=500ms
spring.data.redis.timeout=500ms

# app configuration
server.port=8181

# rate limiter configuration

rate.limit.shorten.max-requests=10
rate.limit.shorten.window-seconds=60

rate.limit.analytics.max-requests=20
rate.limit.analytics.window-seconds=60